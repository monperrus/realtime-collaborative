<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Collaborative Editor</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
      font-size: 13px;
      background: #1e1e2e;
      color: #cdd6f4;
    }

    #app {
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Sidebar ──────────────────────────────────── */
    #sidebar {
      width: 240px;
      min-width: 160px;
      max-width: 400px;
      border-right: 1px solid #313244;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      resize: horizontal;
      background: #181825;
    }

    #sidebar-header {
      padding: 10px 12px;
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #585b70;
      border-bottom: 1px solid #313244;
      user-select: none;
    }

    #file-tree {
      flex: 1;
      overflow-y: auto;
      padding: 4px 0;
    }

    #file-tree::-webkit-scrollbar { width: 4px; }
    #file-tree::-webkit-scrollbar-thumb { background: #313244; border-radius: 2px; }

    .dir-item {
      cursor: pointer;
      padding: 3px 12px;
      color: #89b4fa;
      user-select: none;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .dir-item:hover { background: #24273a; }

    .file-item {
      cursor: pointer;
      padding: 3px 12px;
      color: #cdd6f4;
      user-select: none;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .file-item:hover { background: #24273a; }
    .file-item.active { background: #313244; color: #cba6f7; }

    /* ── Editor pane ──────────────────────────────── */
    #editor-pane {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: #1e1e2e;
    }

    #toolbar {
      padding: 8px 16px;
      font-size: 12px;
      color: #6c7086;
      border-bottom: 1px solid #313244;
      background: #181825;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex-shrink: 0;
    }

    #editor {
      flex: 1;
      overflow: hidden;
    }

    /* ── CodeMirror overrides ─────────────────────── */
    .cm-editor {
      height: 100%;
      background: #1e1e2e !important;
    }
    .cm-scroller { overflow: auto !important; }
    .cm-gutters { background: #181825 !important; border-right: 1px solid #313244 !important; }
    .cm-activeLineGutter { background: #24273a !important; }
    .cm-activeLine { background: #24273a !important; }
    .cm-selectionBackground { background: #45475a !important; }
    .cm-cursor { border-left-color: #cba6f7 !important; }
    .cm-content { color: #cdd6f4; }
    .cm-line { padding: 0 4px 0 8px; }

    /* Yjs remote cursors */
    .cm-ySelectionInfo {
      font-size: 11px;
      padding: 1px 4px;
      border-radius: 3px 3px 3px 0;
      color: #fff;
      opacity: 0.9;
      white-space: nowrap;
    }

    /* Empty state */
    #empty-state {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #45475a;
      font-size: 14px;
      flex-direction: column;
      gap: 8px;
    }
    #empty-state span { font-size: 32px; }
  </style>
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <div id="sidebar-header">Explorer</div>
      <div id="file-tree"></div>
    </aside>
    <div id="editor-pane">
      <div id="toolbar">← Select a file</div>
      <div id="editor">
        <div id="empty-state">
          <span>📂</span>
          Select a file from the sidebar to start editing
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="/bundle.js"></script>
</body>
</html>
